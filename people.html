<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Masood Lab | People</title>
    <style>
        :root { --primary-red: #811218; --white: #ffffff; --light-gray: #f9f9f9; --footer-bg: #1a1a1a; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; color: #333; background-color: var(--light-gray); padding-bottom: 175px; }
        
        header { position: sticky; top: 0; z-index: 1000; background-color: var(--primary-red); padding: 0.75rem 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header img { height: 60px; width: auto; display: block; }
        
        nav { display: flex; gap: 25px; }
        .nav-link { color: var(--white); text-decoration: none; font-weight: 700; font-size: 1rem; padding: 7.5px 12.5px; border-radius: 6px; transition: background-color 0.3s, color 0.3s; }
        .nav-link:hover { background-color: var(--white); color: var(--primary-red); }
        
        .container { max-width: 900px; margin: 2rem auto; padding: 2rem; background: var(--white); border-radius: 8px; }
        h2 { color: var(--primary-red); border-bottom: 2px solid var(--primary-red); padding-bottom: 0.5rem; }
        
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .member-card { text-align: center; }
        .member-card img { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 3px solid var(--primary-red); }
        .member-card h3 { margin: 1rem 0 0.2rem; font-size: 1.1rem; }
        .member-card p { color: #666; font-size: 0.9rem; }
        
        .sticky-footer { position: fixed; left: 0; bottom: 0; width: 100%; background-color: var(--footer-bg); color: #cccccc; padding: 50px 5%; font-size: 1rem; z-index: 1000; box-shadow: 0 -2px 8px rgba(0,0,0,0.4); box-sizing: border-box; }
    </style>
</head>
<body>
<header>
    <a href="index.html"><img src="assets/logo.png" alt="Masood Lab"></a>
    <nav>
        <a href="index.html" class="nav-link">Home</a>
        <a href="people.html" class="nav-link">People</a>
        <a href="publications.html" class="nav-link">Publications</a>
        <a href="news.html" class="nav-link">News</a>
    </nav>
</header>
<div class="container">
    <h2>Our Team</h2>
    <div class="team-grid">
        <div class="member-card">
            <img src="assets/team/ashiq_masood.jpg" alt="Ashiq Masood">
            <h3>Ashiq Masood, MD</h3>
            <p>Principal Investigator</p>
        </div>
        <div class="member-card">
            <img src="assets/team/ateeq_khaliq.jpg" alt="Ateeq Khaliq">
            <h3>Ateeq Khaliq, PhD</h3>
            <p>Research Scientist</p>
        </div>
        <!-- Add more member-card divs here as needed -->
    </div>
</div>
<footer class="sticky-footer">
    <strong>MASOOD LAB</strong><br>
    Health Information and Translational Sciences Building | Indiana University School of Medicine<br>
    410 W. 10th Street, 5th Floor, Suite 5000 | Indianapolis, IN 46202
</footer>
</body>
</html>
