<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Masood Lab | Home</title>
    <style>
        :root { --primary-red: #811218; --white: #ffffff; --footer-bg: #1a1a1a; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }

        /* Header remains sticky */
        header { position: sticky; top: 0; z-index: 1000; background-color: var(--primary-red); padding: 0.75rem 5%; display: flex; justify-content: space-between; align-items: center; }
        header img { height: 60px; width: auto; }
        .nav-link { color: var(--white); text-decoration: none; font-weight: 700; margin-left: 20px; }

        /* Zoom container: The parent controls the scroll duration */
        .zoom-wrapper { height: 200vh; position: relative; }
        
        /* The image is sticky-positioned to "freeze" while scrolling */
        .sticky-zoom {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 
           Using a CSS scroll-timeline is the modern way, 
           but for broad compatibility, we use scale transition 
           triggered by a small intersection observer script below.
        */
        .zoom-img {
            width: 150%; /* Starts zoomed in */
            height: 150%;
            object-fit: cover;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .content-section { padding: 5rem 10%; background: #fff; position: relative; z-index: 10; }
        footer { background: var(--footer-bg); color: #ccc; padding: 50px 5%; text-align: center; }
    </style>
</head>
<body>

<header>
    <a href="index.html"><img src="assets/logo.png" alt="Masood Lab"></a>
    <nav>
        <a href="index.html" class="nav-link">Home</a>
        <a href="people.html" class="nav-link">People</a>
        <a href="publications.html" class="nav-link">Publications</a>
    </nav>
</header>

<div class="zoom-wrapper">
    <div class="sticky-zoom">
        <img src="assets/hits.png" alt="Lab Research" class="zoom-img" id="hero-img">
    </div>
</div>

<div class="content-section">
    <h1>Welcome to the Masood Lab</h1>
    <p>Translational oncology and computational biology research.</p>
</div>

<footer>
    <strong>MASOOD LAB</strong><br>
    IUI Department of Medicine
</footer>

<script>
    // Minimal JS to map scroll position to image scale
    window.addEventListener('scroll', () => {
        const img = document.getElementById('hero-img');
        const scrollY = window.scrollY;
        // Scale from 1.5 down to 1.0 based on scroll
        const scale = Math.max(1, 1.5 - (scrollY / 1000));
        img.style.transform = `scale(${scale})`;
    });
</script>

</body>
</html>
